name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA (not a moveable tag) so a
      # retagged release can never silently change what runs in CI.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # Pin the Flutter version so CI and local builds never drift.
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      # Gate on hand-written source only: generated *.g.dart files are
      # tool output and would inflate the number. Pure awk, so no lcov
      # binary is needed on the runner.
      - name: Enforce 85% coverage on hand-written source
        run: |
          awk '
            /^SF:/ { skip = ($0 ~ /\.g\.dart/) }
            /^LF:/ && !skip { lf += substr($0, 4) }
            /^LH:/ && !skip { lh += substr($0, 4) }
            END {
              if (lf == 0) { print "No coverage data"; exit 1 }
              pct = 100 * lh / lf
              printf "Hand-written coverage: %.1f%% (%d/%d)\n", pct, lh, lf
              if (pct < 85) { print "Below the 85% floor"; exit 1 }
            }
          ' coverage/lcov.info
