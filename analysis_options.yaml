# Strict, enterprise-grade lint set. Stricter than flutter_lints.
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  # Generated files are tool output; we do not hand-edit or lint them.
  exclude:
    - "**/*.g.dart"
    - "**/*.drift.dart"
  errors:
    # Before the first build_runner run, the `part '*.g.dart'` lines
    # point at files that do not exist yet. Do not treat that as fatal.
    uri_has_not_been_generated: ignore

linter:
  rules:
    # We prefer descriptive public constructor parameters (database,
    # api, connectivity) over leaking private field names (_db, _api)
    # into the dependency-injection call sites.
    prefer_initializing_formals: false
