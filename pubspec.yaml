name: field_notes
description: "Field Notes — a tiny offline-first notes app built test-first."
# Never published to pub.dev; this is an application, not a package.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Runtime dependencies are added one at a time, exactly when a failing
# test first needs them — that is the whole point of building this
# test-first. Entries stay alphabetical to satisfy sort_pub_dependencies.
dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: true
